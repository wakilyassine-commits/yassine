<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LexiPro — Business English</title>

<!-- ===== PWA ===== -->

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0f14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LexiPro">

<!-- Apple Touch Icons -->

<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192x192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512x512.png">

<!-- Favicon -->

<link rel="icon" type="image/png" sizes="96x96" href="icons/icon-96x96.png">

<!-- SEO / Description -->

<meta name="description" content="Révisez votre vocabulaire Business English avec flashcards et quiz interactifs — fonctionne hors ligne">

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a22;
    --surface2: #1e2330;
    --border: #2a3040;
    --accent: #4fffb0;
    --accent2: #ff6b6b;
    --accent3: #ffd166;
    --text: #e8eaf0;
    --text-muted: #7a8499;
    --text-dim: #4a5268;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
min-height: 100vh;
overflow-x: hidden;
}

/* Background grid */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image:
linear-gradient(rgba(79,255,176,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(79,255,176,0.03) 1px, transparent 1px);
background-size: 40px 40px;
pointer-events: none;
z-index: 0;
}

.app {
position: relative;
z-index: 1;
max-width: 860px;
margin: 0 auto;
padding: 32px 20px 60px;
}

/* Header */
header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 36px;
padding-bottom: 20px;
border-bottom: 1px solid var(–border);
}

.logo {
font-family: ‘DM Serif Display’, serif;
font-size: 22px;
color: var(–accent);
letter-spacing: -0.5px;
}

.logo span { color: var(–text-muted); font-size: 14px; font-family: ‘DM Sans’, sans-serif; font-weight: 300; margin-left: 10px; }

.progress-bar-wrap {
display: flex;
align-items: center;
gap: 12px;
}

.progress-label {
font-family: ‘DM Mono’, monospace;
font-size: 12px;
color: var(–text-muted);
}

.progress-track {
width: 120px;
height: 4px;
background: var(–border);
border-radius: 4px;
overflow: hidden;
}

.progress-fill {
height: 100%;
background: var(–accent);
border-radius: 4px;
transition: width 0.4s ease;
}

/* Mode tabs */
.tabs {
display: flex;
gap: 8px;
margin-bottom: 28px;
}

.tab {
padding: 9px 20px;
border-radius: 8px;
border: 1px solid var(–border);
background: transparent;
color: var(–text-muted);
font-family: ‘DM Sans’, sans-serif;
font-size: 14px;
font-weight: 500;
cursor: pointer;
transition: all 0.2s;
}

.tab:hover { border-color: var(–accent); color: var(–accent); }
.tab.active { background: var(–accent); color: var(–bg); border-color: var(–accent); font-weight: 600; }

/* Direction toggle */
.controls {
display: flex;
align-items: center;
gap: 16px;
margin-bottom: 28px;
}

.dir-btn {
display: flex;
align-items: center;
gap: 7px;
padding: 7px 14px;
border-radius: 6px;
border: 1px solid var(–border);
background: var(–surface);
color: var(–text-muted);
font-size: 13px;
cursor: pointer;
transition: all 0.2s;
font-family: ‘DM Mono’, monospace;
}

.dir-btn.active { border-color: var(–accent3); color: var(–accent3); background: rgba(255,209,102,0.06); }
.dir-btn:hover { border-color: var(–text-muted); }

.tag {
font-size: 11px;
padding: 2px 8px;
border-radius: 4px;
font-family: ‘DM Mono’, monospace;
font-weight: 500;
}

.tag-cat {
background: rgba(79,255,176,0.1);
color: var(–accent);
border: 1px solid rgba(79,255,176,0.2);
}

/* ===== FLASHCARD ===== */
.flashcard-zone { display: none; }
.flashcard-zone.active { display: block; }

.card-counter {
font-family: ‘DM Mono’, monospace;
font-size: 12px;
color: var(–text-dim);
text-align: center;
margin-bottom: 16px;
letter-spacing: 2px;
text-transform: uppercase;
}

.card-wrap {
perspective: 1200px;
margin-bottom: 24px;
}

.card {
position: relative;
width: 100%;
min-height: 220px;
cursor: pointer;
transform-style: preserve-3d;
transition: transform 0.55s cubic-bezier(0.4,0,0.2,1);
}

.card.flipped { transform: rotateY(180deg); }

.card-face {
position: absolute;
inset: 0;
backface-visibility: hidden;
border-radius: 16px;
padding: 36px 40px;
display: flex;
flex-direction: column;
justify-content: center;
align-items: flex-start;
}

.card-front {
background: var(–surface);
border: 1px solid var(–border);
}

.card-back {
background: var(–surface2);
border: 1px solid rgba(79,255,176,0.25);
transform: rotateY(180deg);
}

.card-face-label {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–text-dim);
margin-bottom: 16px;
}

.card-text {
font-size: 22px;
line-height: 1.5;
color: var(–text);
font-weight: 400;
}

.card-front .card-text { font-family: ‘DM Serif Display’, serif; font-size: 20px; color: #c5cde0; }
.card-back .card-text { font-family: ‘DM Mono’, monospace; font-size: 16px; color: var(–accent); line-height: 1.7; }

.card-hint {
position: absolute;
bottom: 16px;
right: 20px;
font-size: 11px;
color: var(–text-dim);
font-family: ‘DM Mono’, monospace;
}

.card-category {
margin-top: 14px;
}

/* Nav buttons */
.nav-row {
display: flex;
justify-content: center;
align-items: center;
gap: 16px;
margin-top: 8px;
}

.nav-btn {
width: 44px;
height: 44px;
border-radius: 50%;
border: 1px solid var(–border);
background: var(–surface);
color: var(–text-muted);
font-size: 18px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.2s;
}

.nav-btn:hover:not(:disabled) { border-color: var(–accent); color: var(–accent); }
.nav-btn:disabled { opacity: 0.25; cursor: default; }

.nav-btn.shuffle {
width: auto;
border-radius: 8px;
padding: 0 16px;
font-size: 12px;
font-family: ‘DM Mono’, monospace;
letter-spacing: 1px;
text-transform: uppercase;
gap: 6px;
}

.nav-btn.shuffle:hover { border-color: var(–accent3); color: var(–accent3); }

/* ===== QUIZ ===== */
.quiz-zone { display: none; }
.quiz-zone.active { display: block; }

.quiz-score-bar {
display: flex;
gap: 12px;
margin-bottom: 24px;
padding: 14px 20px;
background: var(–surface);
border-radius: 10px;
border: 1px solid var(–border);
align-items: center;
}

.score-pill {
padding: 4px 12px;
border-radius: 20px;
font-family: ‘DM Mono’, monospace;
font-size: 13px;
font-weight: 500;
}

.score-pill.good { background: rgba(79,255,176,0.12); color: var(–accent); border: 1px solid rgba(79,255,176,0.2); }
.score-pill.bad { background: rgba(255,107,107,0.12); color: var(–accent2); border: 1px solid rgba(255,107,107,0.2); }
.score-pill.total { background: rgba(255,255,255,0.05); color: var(–text-muted); border: 1px solid var(–border); }

.score-spacer { flex: 1; }

.quiz-question {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 14px;
padding: 30px 32px;
margin-bottom: 18px;
}

.quiz-q-label {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 2px;
color: var(–text-dim);
text-transform: uppercase;
margin-bottom: 14px;
}

.quiz-q-text {
font-family: ‘DM Serif Display’, serif;
font-size: 19px;
color: #c5cde0;
line-height: 1.55;
}

.quiz-options {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
margin-bottom: 20px;
}

.option-btn {
padding: 14px 18px;
border-radius: 10px;
border: 1px solid var(–border);
background: var(–surface);
color: var(–text);
font-family: ‘DM Mono’, monospace;
font-size: 13px;
cursor: pointer;
text-align: left;
line-height: 1.5;
transition: all 0.15s;
}

.option-btn:hover:not(:disabled) { border-color: var(–accent); color: var(–accent); background: rgba(79,255,176,0.04); }
.option-btn.correct { border-color: var(–accent) !important; background: rgba(79,255,176,0.12) !important; color: var(–accent) !important; }
.option-btn.wrong { border-color: var(–accent2) !important; background: rgba(255,107,107,0.1) !important; color: var(–accent2) !important; }
.option-btn:disabled { cursor: default; }

.quiz-feedback {
padding: 14px 18px;
border-radius: 10px;
font-size: 14px;
line-height: 1.6;
margin-bottom: 16px;
display: none;
}

.quiz-feedback.show { display: block; }
.quiz-feedback.correct-fb { background: rgba(79,255,176,0.07); border: 1px solid rgba(79,255,176,0.2); color: var(–accent); }
.quiz-feedback.wrong-fb { background: rgba(255,107,107,0.07); border: 1px solid rgba(255,107,107,0.2); color: #ff9999; }

.next-btn {
display: none;
margin: 0 auto;
padding: 12px 32px;
background: var(–accent);
color: var(–bg);
border: none;
border-radius: 8px;
font-family: ‘DM Sans’, sans-serif;
font-size: 14px;
font-weight: 600;
cursor: pointer;
transition: opacity 0.2s;
letter-spacing: 0.3px;
}

.next-btn.show { display: block; }
.next-btn:hover { opacity: 0.85; }

/* Results */
.results-zone {
display: none;
text-align: center;
padding: 48px 32px;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 16px;
}

.results-zone.active { display: block; }

.results-score {
font-family: ‘DM Serif Display’, serif;
font-size: 64px;
color: var(–accent);
margin-bottom: 8px;
}

.results-label {
font-size: 15px;
color: var(–text-muted);
margin-bottom: 32px;
}

.restart-btn {
padding: 12px 28px;
background: transparent;
border: 1px solid var(–accent);
color: var(–accent);
border-radius: 8px;
font-family: ‘DM Sans’, sans-serif;
font-size: 14px;
font-weight: 600;
cursor: pointer;
transition: all 0.2s;
}

.restart-btn:hover { background: var(–accent); color: var(–bg); }

/* TTS Button */
.tts-btn {
display: inline-flex;
align-items: center;
gap: 6px;
margin-top: 16px;
padding: 7px 14px;
border-radius: 20px;
border: 1px solid rgba(79,255,176,0.25);
background: rgba(79,255,176,0.06);
color: var(–accent);
font-family: ‘DM Mono’, monospace;
font-size: 12px;
cursor: pointer;
transition: all 0.2s;
letter-spacing: 0.5px;
}

.tts-btn:hover { background: rgba(79,255,176,0.14); border-color: var(–accent); }

.tts-btn.speaking {
background: rgba(79,255,176,0.18);
border-color: var(–accent);
animation: pulse-tts 1s ease-in-out infinite;
}

@keyframes pulse-tts {
0%, 100% { box-shadow: 0 0 0 0 rgba(79,255,176,0.3); }
50% { box-shadow: 0 0 0 6px rgba(79,255,176,0); }
}

.tts-btn-front {
border-color: rgba(200,210,230,0.15);
background: rgba(200,210,230,0.04);
color: var(–text-muted);
}

.tts-btn-front:hover { border-color: var(–text-muted); background: rgba(200,210,230,0.08); color: var(–text); }
.tts-btn-front.speaking { background: rgba(200,210,230,0.12); border-color: var(–text-muted); animation: pulse-tts-grey 1s ease-in-out infinite; }

@keyframes pulse-tts-grey {
0%, 100% { box-shadow: 0 0 0 0 rgba(200,210,230,0.2); }
50% { box-shadow: 0 0 0 6px rgba(200,210,230,0); }
}

.tts-quiz-btn {
display: inline-flex;
align-items: center;
gap: 6px;
margin-top: 10px;
padding: 6px 12px;
border-radius: 20px;
border: 1px solid rgba(79,255,176,0.25);
background: rgba(79,255,176,0.06);
color: var(–accent);
font-family: ‘DM Mono’, monospace;
font-size: 11px;
cursor: pointer;
transition: all 0.2s;
}

.tts-quiz-btn:hover { background: rgba(79,255,176,0.14); }
.tts-quiz-btn.speaking { animation: pulse-tts 1s ease-in-out infinite; }

/* ===== PWA Install Banner ===== */
#installBanner {
position: fixed;
bottom: -100px;
left: 50%;
transform: translateX(-50%);
width: calc(100% - 32px);
max-width: 500px;
background: var(–surface2);
border: 1px solid rgba(79,255,176,0.3);
border-radius: 14px;
padding: 16px 18px;
display: flex;
align-items: center;
gap: 14px;
z-index: 9999;
transition: bottom 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

#installBanner.show { bottom: 24px; }

#installBanner img {
width: 44px;
height: 44px;
border-radius: 10px;
flex-shrink: 0;
}

.install-text { flex: 1; }
.install-text strong { display: block; font-size: 14px; color: var(–text); margin-bottom: 2px; }
.install-text span { font-size: 12px; color: var(–text-muted); }

#installBtn {
padding: 8px 16px;
background: var(–accent);
color: var(–bg);
border: none;
border-radius: 8px;
font-family: ‘DM Sans’, sans-serif;
font-size: 13px;
font-weight: 600;
cursor: pointer;
white-space: nowrap;
flex-shrink: 0;
transition: opacity 0.2s;
}

#installBtn:hover { opacity: 0.85; }

#dismissInstall {
background: none;
border: none;
color: var(–text-dim);
font-size: 18px;
cursor: pointer;
padding: 4px;
flex-shrink: 0;
line-height: 1;
}

#dismissInstall:hover { color: var(–text-muted); }

/* Safe area for PWA on iPhone */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
.app { padding-bottom: calc(60px + env(safe-area-inset-bottom)); }
}

/* Responsive */
@media (max-width: 600px) {
.quiz-options { grid-template-columns: 1fr; }
.card-text { font-size: 17px; }
.card-back .card-text { font-size: 14px; }
}
</style>

</head>
<body>
<div class="app">
  <header>
    <div class="logo">LexiPro <span>Business English</span></div>
    <div class="progress-bar-wrap">
      <span class="progress-label" id="progressLabel">0 / 0</span>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="setMode('flash')">⚡ Flashcards</button>
    <button class="tab" onclick="setMode('quiz')">🎯 Quiz</button>
  </div>

  <div class="controls">
    <button class="dir-btn active" id="dirFrEn" onclick="setDir('fr-en')">🇫🇷 → 🇬🇧</button>
    <button class="dir-btn" id="dirEnFr" onclick="setDir('en-fr')">🇬🇧 → 🇫🇷</button>
  </div>

  <!-- FLASHCARD ZONE -->

  <div class="flashcard-zone active" id="flashZone">
    <div class="card-counter" id="cardCounter">— / —</div>
    <div class="card-wrap">
      <div class="card" id="flashCard" onclick="flipCard()">
        <div class="card-face card-front">
          <div class="card-face-label">Traduction ?</div>
          <div class="card-text" id="cardFront">...</div>
          <button class="tts-btn tts-btn-front" id="ttsFrontBtn" onclick="event.stopPropagation(); speakCard('front')" title="Écouter la prononciation">
            🔊 <span>Écouter</span>
          </button>
          <div class="card-hint">Cliquer pour révéler →</div>
        </div>
        <div class="card-face card-back">
          <div class="card-face-label">✓ Réponse</div>
          <div class="card-text" id="cardBack">...</div>
          <button class="tts-btn" id="ttsBackBtn" onclick="event.stopPropagation(); speakCard('back')" title="Écouter la prononciation anglaise">
            🔊 <span>Écouter EN</span>
          </button>
          <div class="card-category" id="cardCat"></div>
        </div>
      </div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" onclick="prevCard()" disabled>←</button>
      <button class="nav-btn shuffle" onclick="shuffleCards()">⇄ Mélanger</button>
      <button class="nav-btn" id="nextBtn" onclick="nextCard()">→</button>
    </div>
  </div>

  <!-- QUIZ ZONE -->

  <div class="quiz-zone" id="quizZone">
    <div class="quiz-score-bar">
      <div class="score-pill good">✓ <span id="scoreCorrect">0</span></div>
      <div class="score-pill bad">✗ <span id="scoreWrong">0</span></div>
      <div class="score-spacer"></div>
      <div class="score-pill total" id="quizCounter">Q 1 / 20</div>
    </div>
    <div class="quiz-question">
      <div class="quiz-q-label" id="quizLabel">Question</div>
      <div class="quiz-q-text" id="quizQuestion">...</div>
    </div>
    <div class="quiz-options" id="quizOptions"></div>
    <div class="quiz-feedback" id="quizFeedback"></div>
    <div id="quizTtsWrap" style="text-align:center; display:none; margin-bottom:14px;">
      <button class="tts-quiz-btn" id="ttsQuizBtn" onclick="speakQuizAnswer()">🔊 Écouter la bonne réponse en anglais</button>
    </div>
    <button class="next-btn" id="nextQuizBtn" onclick="nextQuiz()">Suivant →</button>
    <div class="results-zone" id="resultsZone">
      <div class="results-score" id="resultsScore">0/0</div>
      <div class="results-label">Quiz terminé ! 🎉</div>
      <button class="restart-btn" onclick="restartQuiz()">Recommencer</button>
    </div>
  </div>
</div>

<script>
const vocab = [
  { fr: "Suite à notre dernière conversation, je reviens vers vous concernant la proposition commerciale que vous avez soumise.", en: "Following up on our last conversation, I'm getting back to you regarding the commercial proposal you submitted.", cat: "Email / Communication" },
  { fr: "Nous constatons que les délais ne sont pas respectés, et cela commence à mettre le projet en danger.", en: "We're noticing that deadlines are not being met, and this is starting to put the project at risk.", cat: "Gestion de projet" },
  { fr: "Nous attendons votre feu vert pour lancer la phase de test.", en: "We're waiting for your go-ahead to kick off the testing phase.", cat: "Gestion de projet" },
  { fr: "Nous avons commandé un audit externe pour identifier les causes profondes des dépassements de coûts récurrents dans le périmètre IT.", en: "We commissioned an external audit to identify the root causes of recurring cost overruns within the IT scope.", cat: "Audit / Finance" },
  { fr: "Le contrat expire le mois prochain, nous devons planifier le renouvellement.", en: "The contract is expiring next month, we need to plan for the renewal.", cat: "Contrats" },
  { fr: "Nous devons planifier un atelier avec les équipes métier pour recueillir leurs besoins.", en: "We need to schedule a workshop with the business teams to gather their requirements.", cat: "Gestion de projet" },
  { fr: "Suite aux décevants résultats du T3, la direction a décidé de revoir la stratégie d'investissement IT pour l'année prochaine.", en: "Following the disappointing Q3 results, senior management has decided to review the IT investment strategy for next year.", cat: "Finance / Stratégie" },
  { fr: "Le périmètre du projet a évolué depuis le cadrage initial, nous devons mettre à jour le budget.", en: "The project scope has evolved since the initial scoping, we need to update the budget.", cat: "Gestion de projet" },
  { fr: "La réunion d'hier était très productive, nous avons réussi à aligner tout le monde.", en: "Yesterday's meeting was very productive, we managed to get everyone aligned.", cat: "Réunions" },
  { fr: "Je vais lancer la réunion en présentant le contexte.", en: "I'll kick off the meeting by presenting the context.", cat: "Réunions" },
  { fr: "Nous devons renforcer l'équipe sur ce projet, nous manquons de ressources.", en: "We need to reinforce the team on this project, we're lacking resources.", cat: "RH / Équipes" },
  { fr: "On doit renforcer l'équipe.", en: "We need to scale up the team.", cat: "Expressions clés" },
  { fr: "On manque de ressources humaines.", en: "We're understaffed.", cat: "Expressions clés" },
  { fr: "Ce n'est plus adapté.", en: "It's no longer fit for purpose.", cat: "Expressions clés" },
  { fr: "Revoir complètement.", en: "Fully revisit / completely overhaul.", cat: "Expressions clés" },
  { fr: "Accord de confidentialité (terme business).", en: "NDA (Non-Disclosure Agreement) — in business you almost always say 'NDA'.", cat: "Vocabulaire business" },
  { fr: "Adhésion des équipes.", en: "Buy-in.", cat: "Vocabulaire business" },
  { fr: "Comité de direction.", en: "Steering committee.", cat: "Vocabulaire business" },
  { fr: "Fuite de données.", en: "Data breach.", cat: "IT / Sécurité" },
  { fr: "N'a pas été respecté.", en: "Was not met.", cat: "Expressions clés" },
  { fr: "Animé (une réunion / un atelier).", en: "Facilitated.", cat: "Expressions clés" },

// ===== TEXT TO SPEECH =====
let currentEnglishForQuiz = '';

function speak(text, lang, btnEl) {
  if (!('speechSynthesis' in window)) { alert('La synthèse vocale n\'est pas supportée par votre navigateur.'); return; }
  window.speechSynthesis.cancel();

  // If button was already speaking, just stop
  if (btnEl && btnEl.classList.contains('speaking')) {
    btnEl.classList.remove('speaking');
    btnEl.querySelector('span') && (btnEl.querySelector('span').textContent = btnEl.dataset.label || 'Écouter');
    return;
  }

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = lang;
  utter.rate = 0.88;
  utter.pitch = 1;

  // Pick best available voice
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => v.lang.startsWith(lang.split('-')[0]) && !v.name.includes('Google') === false)
    || voices.find(v => v.lang.startsWith(lang.split('-')[0]));
  if (preferred) utter.voice = preferred;

  if (btnEl) {
    btnEl.classList.add('speaking');
    const span = btnEl.querySelector('span');
    if (span) { btnEl.dataset.label = span.textContent; span.textContent = '…'; }
    utter.onend = () => {
      btnEl.classList.remove('speaking');
      if (span) span.textContent = btnEl.dataset.label || 'Écouter';
    };
    utter.onerror = () => {
      btnEl.classList.remove('speaking');
      if (span) span.textContent = btnEl.dataset.label || 'Écouter';
    };
  }

  window.speechSynthesis.speak(utter);
}

function speakCard(face) {
  const c = cards[cardIndex];
  const isEnFront = direction === 'en-fr';

  if (face === 'back') {
    // Always speak English on back
    const enText = direction === 'fr-en' ? c.en : c.fr;
    const lang = direction === 'fr-en' ? 'en-GB' : 'fr-FR';
    speak(enText, lang, document.getElementById('ttsBackBtn'));
  } else {
    // Front: speak whatever language is shown
    const frontText = direction === 'fr-en' ? c.fr : c.en;
    const lang = direction === 'fr-en' ? 'fr-FR' : 'en-GB';
    speak(frontText, lang, document.getElementById('ttsFrontBtn'));
  }
}

function speakQuizAnswer() {
  if (!currentEnglishForQuiz) return;
  speak(currentEnglishForQuiz, 'en-GB', document.getElementById('ttsQuizBtn'));
}

// ===== FLASHCARD =====
function renderCard() {
  if (!cards.length) return;
  const c = cards[cardIndex];
  document.getElementById('cardFront').textContent = direction === 'fr-en' ? c.fr : c.en;
  document.getElementById('cardBack').textContent = direction === 'fr-en' ? c.en : c.fr;
  document.getElementById('cardCat').innerHTML = `<span class="tag tag-cat">${c.cat}</span>`;
  document.getElementById('cardCounter').textContent = `${cardIndex + 1} / ${cards.length}`;
  document.getElementById('flashCard').classList.remove('flipped');
  document.getElementById('prevBtn').disabled = cardIndex === 0;
  document.getElementById('nextBtn').disabled = cardIndex === cards.length - 1;
  updateProgress(cardIndex + 1, cards.length);
}

function flipCard() {
  document.getElementById('flashCard').classList.toggle('flipped');
}

function nextCard() {
  if (cardIndex < cards.length - 1) { cardIndex++; renderCard(); }
}

function prevCard() {
  if (cardIndex > 0) { cardIndex--; renderCard(); }
}

function shuffleCards() {
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  cardIndex = 0;
  renderCard();
}

// ===== QUIZ =====
function initQuiz() {
  scoreCorrect = 0;
  scoreWrong = 0;
  quizIndex = 0;
  document.getElementById('scoreCorrect').textContent = 0;
  document.getElementById('scoreWrong').textContent = 0;
  document.getElementById('resultsZone').classList.remove('active');
  document.getElementById('quizOptions').style.display = 'grid';
  document.getElementById('quizQuestion').closest('.quiz-question').style.display = 'block';
  quizQueue = shuffle([...vocab]).slice(0, QUIZ_SIZE);
  renderQuiz();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderQuiz() {
  if (quizIndex >= quizQueue.length) { showResults(); return; }
  const q = quizQueue[quizIndex];
  document.getElementById('quizCounter').textContent = `Q ${quizIndex + 1} / ${QUIZ_SIZE}`;
  updateProgress(quizIndex + 1, QUIZ_SIZE);

  const isAsk = direction === 'fr-en';
  document.getElementById('quizLabel').textContent = isAsk ? '🇫🇷 → Quelle est la traduction anglaise ?' : '🇬🇧 → Quelle est la traduction française ?';
  document.getElementById('quizQuestion').textContent = isAsk ? q.fr : q.en;

  // 4 options: 1 correct + 3 wrong
  const correct = isAsk ? q.en : q.fr;
  currentEnglishForQuiz = q.en; // always store English for TTS
  const wrongs = shuffle(vocab.filter(v => v !== q)).slice(0, 3).map(v => isAsk ? v.en : v.fr);
  const options = shuffle([correct, ...wrongs]);

  const container = document.getElementById('quizOptions');
  container.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt.length > 100 ? opt.slice(0, 97) + '…' : opt;
    btn.title = opt;
    btn.onclick = () => checkAnswer(opt, correct, options);
    container.appendChild(btn);
  });

  const fb = document.getElementById('quizFeedback');
  fb.className = 'quiz-feedback';
  fb.textContent = '';
  document.getElementById('nextQuizBtn').classList.remove('show');
  document.getElementById('quizTtsWrap').style.display = 'none';
  document.getElementById('ttsQuizBtn').classList.remove('speaking');
}

function checkAnswer(chosen, correct, options) {
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => {
    b.disabled = true;
    if (b.title === correct || b.textContent.includes(correct.slice(0,30))) {
      if (b.title === correct) b.classList.add('correct');
    }
    if (b.title === chosen && chosen !== correct) b.classList.add('wrong');
    if (b.title === correct) b.classList.add('correct');
  });

  const fb = document.getElementById('quizFeedback');
  if (chosen === correct) {
    scoreCorrect++;
    fb.className = 'quiz-feedback correct-fb show';
    fb.innerHTML = '✓ Correct !';
    document.getElementById('scoreCorrect').textContent = scoreCorrect;
  } else {
    scoreWrong++;
    fb.className = 'quiz-feedback wrong-fb show';
    fb.innerHTML = `✗ La bonne réponse était :<br><strong>${correct}</strong>`;
    document.getElementById('scoreWrong').textContent = scoreWrong;
  }
  document.getElementById('nextQuizBtn').classList.add('show');
  document.getElementById('quizTtsWrap').style.display = 'block';
}

function nextQuiz() {
  quizIndex++;
  renderQuiz();
}

function showResults() {
  document.getElementById('resultsZone').classList.add('active');
  document.getElementById('quizOptions').style.display = 'none';
  document.getElementById('quizQuestion').closest('.quiz-question').style.display = 'none';
  document.getElementById('nextQuizBtn').classList.remove('show');
  document.getElementById('quizFeedback').className = 'quiz-feedback';
  document.getElementById('resultsScore').textContent = `${scoreCorrect} / ${QUIZ_SIZE}`;
  updateProgress(QUIZ_SIZE, QUIZ_SIZE);
}

function restartQuiz() {
  document.getElementById('resultsZone').classList.remove('active');
  document.getElementById('quizOptions').style.display = 'grid';
  document.getElementById('quizQuestion').closest('.quiz-question').style.display = 'block';
  initQuiz();
}

function updateProgress(cur, total) {
  document.getElementById('progressLabel').textContent = `${cur} / ${total}`;
  document.getElementById('progressFill').style.width = `${(cur / total) * 100}%`;
}

  e.preventDefault();
  deferredPrompt = e;
  if (installBanner) installBanner.classList.add('show');
});

if (installBtn) {
  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBanner.classList.remove('show');
  });
}

if (dismissBtn) {
  dismissBtn.addEventListener('click', () => {
    installBanner.classList.remove('show');
  });
}

window.addEventListener('appinstalled', () => {
  console.log('[LexiPro] App installée avec succès !');
  if (installBanner) installBanner.classList.remove('show');
});
</script>

<!-- PWA Install Banner -->

<div id="installBanner">
  <img src="icons/icon-96x96.png" alt="LexiPro icon">
  <div class="install-text">
    <strong>Installer LexiPro</strong>
    <span>Accès rapide + mode hors ligne</span>
  </div>
  <button id="installBtn">Installer</button>
  <button id="dismissInstall" title="Fermer">✕</button>
</div>
</body>
</html>
